<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directive A-1</title>

<style>
body{
    margin:0;
    background:#05070c;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.05);
    padding:35px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
    font-size:24px;
    letter-spacing:3px;
    margin-bottom:8px;
}

.sub{
    opacity:0.6;
    font-size:12px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    background:#0c111b;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;
    color:white;
    text-align:center;
    letter-spacing:3px;
}

button{
    width:100%;
    padding:15px;
    margin-top:18px;
    background:#b30000;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
}

button:hover{
    background:#e00000;
}

#error{
    color:#ff4d4d;
    margin-top:18px;
    display:none;
    font-size:13px;
}

#glitch{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:18px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div class="container">
    <h1>DIRECTIVE A-1</h1>
    <div class="sub">Restricted Internal Channel • Clearance Required</div>

    <input type="password" id="code" placeholder="ENTER NUMERIC KEY">
    <button onclick="unlock()">DECRYPT FILE</button>

    <div id="error">ACCESS DENIED</div>
</div>

<div id="glitch">
    SECURE CHANNEL OPENING...
</div>

<script>
function unlock(){
    var input = document.getElementById("code").value;

    if(input === "11423817"){
        document.getElementById("error").style.display = "none";
        document.getElementById("glitch").style.display = "flex";

        setTimeout(function(){
            window.location.href = "mm-call.html";
        }, 2000);
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
