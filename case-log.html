<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Case Log – Internal Channel</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#e9e9e9;
  font-family: Arial, sans-serif;
  padding:30px 15px;
}
.container{max-width:520px;margin:auto;}
.header{
  border:1px solid #2a2a2a;
  background:#111;
  padding:15px;
}
.header-top{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#bdbdbd;
}
.header-main{margin-top:6px;font-size:18px;font-weight:bold;}
.header-sub{margin-top:4px;font-size:12px;color:#bdbdbd;}

.chat-box{
  margin-top:15px;
  border:1px solid #2a2a2a;
  background:#101010;
  padding:15px;
  min-height:240px;
}

.message{
  margin-bottom:12px;
  font-size:14px;
  line-height:1.55;
}

.mm{ color:#ffb3b3; }
.player{ color:#9fd3ff; }
.guard{ color:#e9e9e9; }
.system{ color:#8b8b8b; font-style:italic; }

.alert{
  margin-top:20px;
  padding:14px;
  border:1px solid #8b0000;
  background:#140000;
  font-size:13px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  font-size:16px;
  font-weight:bold;
  background:#8b0000;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-top">Major Crimes Division • Internal Channel</div>
    <div class="header-main">LIVE CASE COMMUNICATION LOG</div>
    <div class="header-sub">Case File #001: What They Buried</div>
  </div>

  <div class="chat-box" id="chat"></div>

  <div id="photoSection" style="display:none;">
    <div class="alert">
      Incoming Attachment Received • Source: Building Security
    </div>
    <button onclick="window.location.href='envelope-d.html'">
      OPEN ENVELOPE D – NEW LEAD
    </button>
  </div>

</div>

<script>
// Prevent skipping
if(localStorage.getItem("camUnlocked") !== "true"){
  window.location.href="index.html";
}

var chat = document.getElementById("chat");

function addMessage(text, className){
  var div = document.createElement("div");
  div.className = "message " + className;
  div.innerHTML = text;
  chat.appendChild(div);
  window.scrollTo(0,document.body.scrollHeight);
}

function sequence(){

/* -------------------------
   Pre-call: You + M.M.
--------------------------*/
setTimeout(()=>addMessage("<b>You:</b> Reviewed CAM-17B.", "player"),1000);
setTimeout(()=>addMessage("<b>You:</b> There’s a figure on the driveway.", "player"),4500);
setTimeout(()=>addMessage("<b>You:</b> No face. No identifiers.", "player"),8500);
setTimeout(()=>addMessage("<b>You:</b> Only usable detail is the shoe profile.", "player"),12500);

setTimeout(()=>addMessage("<b>M.M:</b> That’s enough to start narrowing.", "mm"),17500);
setTimeout(()=>addMessage("<b>M.M:</b> Log it. I’m checking external contacts now.", "mm"),21500);

/* -------------------------
   Incoming call
--------------------------*/
setTimeout(()=>addMessage("<b>SYSTEM:</b> Incoming Call – Building Security", "system"),28500);

/* -------------------------
   Call transcript: Security + YOU (not M.M.)
--------------------------*/
setTimeout(()=>addMessage("<b>Security:</b> Detective… I didn’t think this would happen.", "guard"),34500);
setTimeout(()=>addMessage("<b>Security:</b> I swear… I didn’t mean for anyone to get hurt.", "guard"),39000);

setTimeout(()=>addMessage("<b>You:</b> Stop. Identify yourself.", "player"),44500);
setTimeout(()=>addMessage("<b>You:</b> Name. Job. Location.", "player"),48500);

setTimeout(()=>addMessage("<b>Security:</b> I’m building security.", "guard"),54000);
setTimeout(()=>addMessage("<b>Security:</b> Night shift. Downtown offices on Garrison.", "guard"),58500);

setTimeout(()=>addMessage("<b>You:</b> Why are you calling Major Crimes?", "player"),64000);

setTimeout(()=>addMessage("<b>Security:</b> Because the victim… I saw her before.", "guard"),70000);
setTimeout(()=>addMessage("<b>Security:</b> A few days before she died.", "guard"),74500);

setTimeout(()=>addMessage("<b>You:</b> Saw her where?", "player"),80000);

setTimeout(()=>addMessage("<b>Security:</b> In our building.", "guard"),85500);
setTimeout(()=>addMessage("<b>Security:</b> After hours.", "guard"),89500);

setTimeout(()=>addMessage("<b>You:</b> Was she alone?", "player"),95000);

setTimeout(()=>addMessage("<b>Security:</b> No.", "guard"),100500);
setTimeout(()=>addMessage("<b>Security:</b> She met someone.", "guard"),104500);

setTimeout(()=>addMessage("<b>You:</b> Who?", "player"),109500);

setTimeout(()=>addMessage("<b>Security:</b> A man.", "guard"),115000);
setTimeout(()=>addMessage("<b>Security:</b> Married.", "guard"),118500);

setTimeout(()=>addMessage("<b>You:</b> How do you know he’s married?", "player"),124000);

setTimeout(()=>addMessage("<b>Security:</b> I looked him up later.", "guard"),130000);
setTimeout(()=>addMessage("<b>Security:</b> I shouldn’t have.", "guard"),134500);

setTimeout(()=>addMessage("<b>You:</b> Why didn’t you report this immediately?", "player"),140000);

setTimeout(()=>addMessage("<b>Security:</b> Because I thought it was just… personal.", "guard"),147000);
setTimeout(()=>addMessage("<b>Security:</b> Then she turned up dead.", "guard"),152500);
setTimeout(()=>addMessage("<b>Security:</b> And I realized I might look involved.", "guard"),158500);

setTimeout(()=>addMessage("<b>You:</b> Do you have proof of the meeting?", "player"),165000);

setTimeout(()=>addMessage("<b>Security:</b> I have a hallway photo.", "guard"),172000);
setTimeout(()=>addMessage("<b>Security:</b> I took it discreetly.", "guard"),176500);
setTimeout(()=>addMessage("<b>Security:</b> It shows them entering together.", "guard"),181000);

setTimeout(()=>addMessage("<b>You:</b> Send it. Now.", "player"),186500);

setTimeout(()=>addMessage("<b>SYSTEM:</b> Attachment Received.", "system"),191500);

setTimeout(()=>{
  document.getElementById("photoSection").style.display="block";
},196500);

/* Optional: M.M. reacts AFTER attachment arrives (but call is still YOU)
setTimeout(()=>addMessage("<b>M.M:</b> Good. Preserve source. We move on this.", "mm"),205000);
*/

}

sequence();
</script>

</body>
</html>
