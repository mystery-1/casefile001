<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Case Log – Internal Channel</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#e9e9e9;
  font-family: Arial, sans-serif;
  padding:30px 15px;
}
.container{max-width:520px;margin:auto;}
.header{
  border:1px solid #2a2a2a;
  background:#111;
  padding:15px;
}
.header-top{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#bdbdbd;
}
.header-main{margin-top:6px;font-size:18px;font-weight:bold;}
.header-sub{margin-top:4px;font-size:12px;color:#bdbdbd;}

.chat-box{
  margin-top:15px;
  border:1px solid #2a2a2a;
  background:#101010;
  padding:15px;
  min-height:200px;
}

.message{
  margin-bottom:12px;
  font-size:14px;
  line-height:1.5;
}

.mm{ color:#ffb3b3; }
.player{ color:#9fd3ff; }
.guard{ color:#e9e9e9; }
.system{ color:#8b8b8b; font-style:italic; }

.alert{
  margin-top:20px;
  padding:14px;
  border:1px solid #8b0000;
  background:#140000;
  font-size:13px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  font-size:16px;
  font-weight:bold;
  background:#8b0000;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-top">Major Crimes Division • Internal Channel</div>
    <div class="header-main">LIVE CASE COMMUNICATION LOG</div>
    <div class="header-sub">Case File #001: What They Buried</div>
  </div>

  <div class="chat-box" id="chat"></div>

  <div id="photoSection" style="display:none;">
    <div class="alert">
      Incoming Attachment Received.
    </div>
    <button onclick="window.location.href='envelope-d.html'">
      OPEN ENVELOPE D – NEW SUSPECT
    </button>
  </div>

</div>

<script>

// Prevent skipping ahead
if(localStorage.getItem("camUnlocked") !== "true"){
  window.location.href="index.html";
}

var chat = document.getElementById("chat");

function addMessage(text, className){
  var div = document.createElement("div");
  div.className = "message " + className;
  div.innerHTML = text;
  chat.appendChild(div);
  window.scrollTo(0,document.body.scrollHeight);
}

// Realistic pacing sequence
function sequence(){

setTimeout(()=>addMessage("<b>You:</b> I watched it.", "player"),1000);
setTimeout(()=>addMessage("<b>You:</b> There’s someone there.", "player"),3500);
setTimeout(()=>addMessage("<b>You:</b> But I can’t make out anything.", "player"),6500);
setTimeout(()=>addMessage("<b>You:</b> It’s dark. Grainy.", "player"),9500);
setTimeout(()=>addMessage("<b>You:</b> Only thing clear is shoe profile.", "player"),12500);

setTimeout(()=>addMessage("<b>M.M:</b> Understood.", "mm"),16500);
setTimeout(()=>addMessage("<b>M.M:</b> Stay with that detail.", "mm"),19500);
setTimeout(()=>addMessage("<b>M.M:</b> I’m checking external contacts now.", "mm"),22500);

setTimeout(()=>addMessage("<b>SYSTEM:</b> Incoming Call – Building Security", "system"),27000);

setTimeout(()=>addMessage("<b>Security:</b> I didn’t think this would happen.", "guard"),31000);
setTimeout(()=>addMessage("<b>Security:</b> I swear.", "guard"),33500);
setTimeout(()=>addMessage("<b>Security:</b> I just saw them meeting.", "guard"),36500);
setTimeout(()=>addMessage("<b>Security:</b> Private conference room.", "guard"),39500);
setTimeout(()=>addMessage("<b>Security:</b> It felt wrong.", "guard"),42500);

setTimeout(()=>addMessage("<b>M.M:</b> Who was with her?", "mm"),47000);

setTimeout(()=>addMessage("<b>Security:</b> A man.", "guard"),51000);
setTimeout(()=>addMessage("<b>Security:</b> Married.", "guard"),53500);
setTimeout(()=>addMessage("<b>Security:</b> I looked him up later.", "guard"),56500);

setTimeout(()=>addMessage("<b>Security:</b> I tried messaging him.", "guard"),60500);
setTimeout(()=>addMessage("<b>Security:</b> He told me to stop contacting him.", "guard"),64500);

setTimeout(()=>addMessage("<b>M.M:</b> Do you have proof?", "mm"),69000);

setTimeout(()=>addMessage("<b>Security:</b> I took a photo.", "guard"),73000);
setTimeout(()=>addMessage("<b>Security:</b> I never meant for her to die.", "guard"),76000);

setTimeout(()=>addMessage("<b>SYSTEM:</b> Attachment Received.", "system"),80000);

setTimeout(()=>{
document.getElementById("photoSection").style.display="block";
},83000);

}

sequence();

</script>

</body>
</html>
