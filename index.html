<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCD Internal Server</title>

<style>
:root{
  --bg:#0b0f17;
  --panel:rgba(20,25,35,0.85);
  --stroke:rgba(255,255,255,0.08);
  --text:#e6e9ef;
  --muted:rgba(255,255,255,0.55);
  --accent:#00ff99;
  --danger:#c40000;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1000px 600px at 15% 10%, rgba(180,0,0,0.25), transparent 60%),
    radial-gradient(900px 500px at 85% 20%, rgba(0,255,153,0.15), transparent 60%),
    var(--bg);
}

.container{
  width:95%;
  max-width:500px;
  padding:32px;
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.header{
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

h1{
  margin:0 0 6px 0;
  font-size:26px;
  letter-spacing:2px;
}

.sub{
  color:var(--muted);
  font-size:13px;
  margin-bottom:24px;
}

label{
  display:block;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:16px;
  border-radius:12px;
  border:1px solid var(--stroke);
  background:#101520;
  color:white;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,255,153,0.1);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg,#e00000,#900000);
  color:white;
  font-weight:bold;
  letter-spacing:2px;
  cursor:pointer;
}

button:hover{
  filter:brightness(1.1);
}

#error{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  border:1px dashed rgba(255,0,0,0.4);
  background:rgba(255,0,0,0.08);
  color:#ffaaaa;
  font-size:13px;
  display:none;
}

.footer{
  margin-top:18px;
  font-size:11px;
  color:rgba(255,255,255,0.4);
  text-align:center;
  letter-spacing:2px;
  text-transform:uppercase;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">Major Crimes Division • Internal Network</div>
  <h1>Secure Archive Access</h1>
  <div class="sub">Case File #001 — Temporary Credentials Issued</div>

  <label>Username</label>
  <input id="username" autocomplete="off" placeholder="ENTER USERNAME">

  <label>Password</label>
  <input id="password" type="password" placeholder="ENTER PASSWORD">

  <button onclick="login()">Access Archive</button>

  <div id="error">ACCESS DENIED — Invalid credentials</div>

  <div class="footer">All access attempts are logged</div>
</div>

<script>
function login(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(user === "MMDIV17" && pass === "TEMP-ACCESS"){
    window.location.href = "footage.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}

document.addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>

</body>
</html>
