<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live Call Transcript</title>
  <style>
    :root{
      --bg:#07080a;
      --panel:#0f1116;
      --panel2:#0b0d11;
      --text:#e9eef7;
      --muted:#9aa6b2;
      --accent:#4aa3ff;
      --danger:#ff3b30;
      --line:rgba(255,255,255,.08);
      --glow:rgba(255,59,48,.22);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 30% 0%, rgba(255,255,255,.06), transparent 55%),
                  radial-gradient(1000px 500px at 90% 10%, rgba(255,59,48,.08), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px 16px 40px;
    }

    .wrap{width:min(760px, 100%)}

    .topline{
      letter-spacing:.22em;
      text-transform:uppercase;
      font-weight:650;
      font-size:12px;
      color:rgba(233,238,247,.68);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .chip{
      padding:8px 12px;
      border:1px solid rgba(255,59,48,.45);
      color:rgba(255,59,48,.9);
      border-radius:14px;
      box-shadow: 0 0 0 3px var(--glow);
      font-weight:750;
      letter-spacing:.18em;
      font-size:11px;
      text-transform:uppercase;
      white-space:nowrap;
    }

    h1{
      margin:0 0 14px 0;
      font-size:44px;
      letter-spacing:.02em;
      line-height:1.05;
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 55%), var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.55);
      overflow:hidden;
    }

    .statusbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:16px;
      margin-bottom:14px;
    }
    .status-left{display:flex; align-items:center; gap:10px}
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255,59,48,.16), 0 0 20px rgba(255,59,48,.35);
      flex:none;
    }
    .status-title{
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(233,238,247,.85);
    }
    .status-sub{
      font-size:12px;
      color:rgba(233,238,247,.55);
      margin-top:2px;
    }
    .status-right{
      text-align:right;
      font-size:12px;
      color:rgba(233,238,247,.55);
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .log{
      background: var(--panel2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 16px;
      max-height: 62vh;
      overflow:auto;
    }

    .row{
      display:flex;
      gap:10px;
      padding:10px 6px;
      border-bottom:1px dashed rgba(255,255,255,.06);
    }
    .row:last-child{border-bottom:none}

    .speaker{
      flex:none;
      min-width:118px;
      font-weight:900;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .speaker.you{color:var(--accent)}
    .speaker.security{color:rgba(233,238,247,.92)}
    .msg{
      flex:1;
      font-size:18px;
      line-height:1.45;
      color:rgba(233,238,247,.92);
      word-break:break-word;
    }

    .typing{
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 6px 4px;
      color:rgba(233,238,247,.62);
      font-size:14px;
    }
    .bubbles{
      display:inline-flex;
      gap:6px;
    }
    .bubbles span{
      width:6px;height:6px;border-radius:999px;
      background:rgba(233,238,247,.55);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .bubbles span:nth-child(2){animation-delay:.15s}
    .bubbles span:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.55}
      40%{transform:translateY(-4px);opacity:1}
    }

    .footer{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,.08);
      color:rgba(233,238,247,.55);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
      font-size:12px;
      text-align:center;
    }

    .next{
      margin-top:12px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      text-align:center;
      font-weight:800;
      color:rgba(233,238,247,.9);
    }
    .next strong{
      color:rgba(255,255,255,.95);
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    /* subtle scrollbar */
    .log::-webkit-scrollbar{width:10px}
    .log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:999px}
    .log::-webkit-scrollbar-track{background:transparent}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <div>MAJOR CRIMES DIVISION • SECURE LINE</div>
      <div class="chip">CONFIDENTIAL</div>
    </div>

    <h1>Live Call Transcript</h1>

    <div class="panel">
      <div class="statusbar">
        <div class="status-left">
          <div class="dot"></div>
          <div>
            <div class="status-title">Incoming Call Connected</div>
            <div class="status-sub" id="callMeta">Source: Building Security • Line: Unlisted</div>
          </div>
        </div>
        <div class="status-right" id="timer">00:00</div>
      </div>

      <div class="log" id="log"></div>

      <div class="typing" id="typing" style="display:none;">
        <span id="typingWho">SECURITY</span>
        <span>is speaking</span>
        <span class="bubbles"><span></span><span></span><span></span></span>
      </div>

      <div class="next" id="nextBox" style="display:none;">
        To proceed further, go to <strong>Envelope A</strong> (New Lead).
      </div>

      <div class="footer">AUTHORIZED PERSONNEL ONLY • DO NOT SHARE OUTSIDE MAJOR CRIMES DIVISION</div>
    </div>
  </div>

  <script>
    // ===== LIVE "MESSAGE BY MESSAGE" SCRIPT =====
    // speaker values: "you" | "security" | "system"
    const script = [
      { speaker:"you",     text:"Hello…?" },
      { speaker:"security",text:"Detective—listen. Please don’t hang up." },
      { speaker:"you",     text:"Who is this. Name." },
      { speaker:"security",text:"I… I’m building security. Night shift. West entrance." },
      { speaker:"you",     text:"Which building? Say it." },
      { speaker:"security",text:"Garrison Woods perimeter—Elm Street side. I saw your name on the incident sheet." },
      { speaker:"you",     text:"How did you get my number?" },
      { speaker:"security",text:"I shouldn’t have it. I pulled it after they found her. I panicked." },
      { speaker:"you",     text:"You’re calling from a blocked line." },
      { speaker:"security",text:"Because if anyone traces this back to me, I look involved." },
      { speaker:"you",     text:"Start over. What did you see? When?" },
      { speaker:"security",text:"The night she arrived. Late—close to midnight. Rain starting, grounds empty." },
      { speaker:"you",     text:"Olivia Bennett was there. Why would she be there?" },
      { speaker:"security",text:"I don’t know. But she moved like she knew the place. Like she’d done it before." },
      { speaker:"you",     text:"Was she alone?" },
      { speaker:"security",text:"No." },
      { speaker:"security",text:"She met someone. A man." },
      { speaker:"you",     text:"Describe him." },
      { speaker:"security",text:"Tall. Clean coat. Kept his face turned away from the camera angle." },
      { speaker:"you",     text:"How close were you?" },
      { speaker:"security",text:"Close enough to hear him say her name once. That’s what’s killing me." },
      { speaker:"you",     text:"Why didn’t you report this immediately?" },
      { speaker:"security",text:"Because I thought it was… personal. Something private. And I didn’t want my supervisor asking why I was watching." },
      { speaker:"security",text:"Then she turned up dead." },
      { speaker:"security",text:"And I realized I might look like an accomplice." },
      { speaker:"you",     text:"You said you saw them together. Do you have proof?" },
      { speaker:"security",text:"I took one photo. Hallway angle—quick, discreet. It shows them entering together." },
      { speaker:"you",     text:"Send it. Now." },
      { speaker:"system",  text:"Attachment Received." },
      { speaker:"system",  text:"Next step: To proceed further, go to Envelope A (New Lead)." }
    ];

    // ===== TUNING (slower + more intense) =====
    const BASE_DELAY_MS = 900;            // pause between lines
    const PER_CHAR_MS   = 28;             // typing speed
    const THINK_EXTRA_MS = 700;           // extra hesitation for security lines
    const SYSTEM_DELAY_MS = 650;

    const log = document.getElementById("log");
    const typing = document.getElementById("typing");
    const typingWho = document.getElementById("typingWho");
    const timerEl = document.getElementById("timer");
    const nextBox = document.getElementById("nextBox");

    // Timer
    let startTime = Date.now();
    setInterval(() => {
      const s = Math.floor((Date.now() - startTime)/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      timerEl.textContent = `${mm}:${ss}`;
    }, 250);

    function addRow(speaker, text){
      const row = document.createElement("div");
      row.className = "row";

      const sp = document.createElement("div");
      sp.className = `speaker ${speaker}`;
      sp.textContent = speaker === "you" ? "YOU:" :
                       speaker === "security" ? "SECURITY:" : "SYSTEM:";

      const msg = document.createElement("div");
      msg.className = "msg";
      msg.textContent = text;

      row.appendChild(sp);
      row.appendChild(msg);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
    }

    function showTyping(forSpeaker){
      if(forSpeaker === "system"){
        typing.style.display = "none";
        return;
      }
      typingWho.textContent = (forSpeaker === "you") ? "YOU" : "SECURITY";
      typing.style.display = "flex";
    }

    function hideTyping(){
      typing.style.display = "none";
    }

    async function play(){
      for(let i=0;i<script.length;i++){
        const line = script[i];
        const speaker = line.speaker;

        // typing indicator
        showTyping(speaker);

        // delay to simulate speaking/typing
        let delay = BASE_DELAY_MS + (line.text.length * PER_CHAR_MS);
        if(speaker === "security") delay += THINK_EXTRA_MS;
        if(speaker === "system") delay = SYSTEM_DELAY_MS;

        await new Promise(r => setTimeout(r, delay));
        hideTyping();
        addRow(speaker, line.text);

        // after final system guidance, reveal the "Envelope A" box
        if(i === script.length - 1){
          nextBox.style.display = "block";
        }
      }
    }

    // Start playback immediately on page load
    play();
  </script>
</body>
</html>
