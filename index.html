<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case File 001</title>

<style>
body{
    margin:0;
    background:#05070c;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
    backdrop-filter:blur(10px);
}

h1{
    margin-bottom:10px;
    font-size:24px;
    letter-spacing:2px;
}

.sub{
    opacity:0.6;
    font-size:12px;
    margin-bottom:25px;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    font-size:16px;
    background:#0c111b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    color:white;
}

button{
    width:100%;
    padding:14px;
    background:#b30000;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    letter-spacing:2px;
}

button:hover{
    background:#e00000;
}

#error{
    color:#ff4d4d;
    margin-top:12px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>SECURE ACCESS</h1>
    <div class="sub">Major Crimes Division • Internal Server</div>

    <input type="text" id="username" placeholder="USERNAME">
    <input type="password" id="password" placeholder="PASSWORD">
    <button onclick="login()">ENTER</button>

    <div id="error">ACCESS DENIED</div>
</div>

<script>
function login(){
    var user = document.getElementById("username").value.trim();
    var pass = document.getElementById("password").value.trim();

    // Replace these with whatever M.M gave the player
    var correctUser = "detective";
    var correctPass = "11420817";

    if(user === correctUser && pass === correctPass){
        window.location.href = "footage.html";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
