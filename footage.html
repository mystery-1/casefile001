<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Major Crimes Division – Footage Archive</title>

<style>
body{
    margin:0;
    background:#05070d;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.header{
    padding:20px;
    letter-spacing:2px;
    font-size:14px;
    opacity:0.7;
}

.video-container{
    padding:20px;
}

video{
    width:100%;
    border-radius:12px;
}

#incomingCall{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    color:white;
    text-align:center;
    padding-top:30%;
    z-index:999;
}

.callBox{
    border:1px solid #333;
    padding:25px;
    width:85%;
    margin:auto;
    border-radius:14px;
    background:#0d111c;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.accept{
    background:#1db954;
    color:white;
}

.decline{
    background:#aa0000;
    color:white;
}

#callScreen{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    color:white;
    z-index:998;
    padding:20px;
}

#endMessage{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    color:white;
    text-align:center;
    padding-top:40%;
    font-size:20px;
}
</style>
</head>

<body>

<div class="header">
MAJOR CRIMES DIVISION • ARCHIVE ID: CAM-17B
</div>

<div class="video-container">
<video id="footage" controls>
<source src="footage.mp4" type="video/mp4">
</video>
</div>

<!-- Incoming Call Screen -->
<div id="incomingCall">
    <div class="callBox">
        <h2>INCOMING CALL</h2>
        <p>Building Security</p>
        <button class="accept" onclick="acceptCall()">Accept</button>
        <button class="decline" onclick="declineCall()">Decline</button>
    </div>
</div>

<!-- Call Screen -->
<div id="callScreen">
    <h2>Secure Line Connected</h2>
    <p>Call in Progress...</p>
</div>

<!-- End Message -->
<div id="endMessage">
    ATTACHMENT RECEIVED<br><br>
    Proceed to Envelope A.
</div>

<audio id="securityCall" src="security-call.mp3.mp3"></audio>

<script>
let video = document.getElementById("footage");
let incoming = document.getElementById("incomingCall");
let callScreen = document.getElementById("callScreen");
let audio = document.getElementById("securityCall");
let endMessage = document.getElementById("endMessage");

let callTriggered = false;

video.addEventListener("timeupdate", function() {
    if(video.currentTime >= 9 && !callTriggered){
        callTriggered = true;
        incoming.style.display = "block";
    }
});

function acceptCall(){
    incoming.style.display = "none";
    callScreen.style.display = "block";
    audio.play();

    audio.onended = function(){
        callScreen.style.display = "none";
        endMessage.style.display = "block";
    }
}

function declineCall(){
    incoming.style.display = "none";
    setTimeout(function(){
        incoming.style.display = "block";
    },2000);
}
</script>

</body>
</html>
