<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>External Line — Kavya</title>
  <style>
    :root{
      --bg:#05070c;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --red:#d11b2d;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 20%, rgba(255,60,90,.08), transparent 55%),
        radial-gradient(900px 600px at 80% 25%, rgba(160,70,255,.16), transparent 60%),
        linear-gradient(180deg, #070a14, var(--bg));
      overflow:hidden;
    }
    .wrap{ width:min(920px, 92vw); padding:22px; }
    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 70px rgba(0,0,0,.45);
      position:relative;
      overflow:hidden;
    }
    .top{
      display:flex; justify-content:space-between; align-items:center;
      letter-spacing:.22em; text-transform:uppercase; font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }
    .dot{ width:8px; height:8px; border-radius:99px; background:var(--red); box-shadow:0 0 18px rgba(209,27,45,.55);}
    .h1{ font-size:34px; font-weight:900; letter-spacing:.06em; margin:8px 0 6px; text-transform:uppercase; }
    .sub{ color:var(--muted); margin:0 0 14px; line-height:1.35; }

    .syslog{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      color:rgba(255,255,255,.68);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px;
      line-height:1.5;
    }
    .hint{ margin-top:10px; color:rgba(255,255,255,.55); font-size:12px; }

    .overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.74);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }
    .incoming{
      width:min(720px, 94vw);
      border-radius:22px;
      background: rgba(10,12,18,.92);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
      padding:20px;
      backdrop-filter: blur(14px);
    }
    .incomingTop{
      display:flex; justify-content:space-between; align-items:center;
      color:rgba(255,255,255,.70);
      font-size:12px; letter-spacing:.22em; text-transform:uppercase;
      margin-bottom:10px;
    }
    .incomingTitle{
      font-size:30px; font-weight:900; margin:6px 0 10px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    .incomingSub{ color:rgba(255,255,255,.70); margin:0 0 16px; }
    .btn{
      width:100%;
      padding:16px 14px;
      border-radius:14px;
      border:0;
      font-weight:900;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
      color:#fff;
      background: linear-gradient(180deg, rgba(209,27,45,.95), rgba(130,18,28,.95));
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>MAJOR CRIMES DIVISION • EXTERNAL LINE</div>
        <div class="badge"><span class="dot"></span> LIVE</div>
      </div>

      <div class="h1">CALL ACTIVE — KAVYA</div>
      <p class="sub">Unrecorded / External Line • Priority: Panic / Live</p>

      <div class="syslog" id="log">
        SYSLOG: awaiting manual handshake…<br/>
        NODE: EXT-LINE • ROUTE: DIRECT
      </div>

      <div class="hint">Audio starts after ANSWER.</div>

      <!-- Voice call -->
      <audio id="voice" preload="auto" playsinline>
        <source src="./call-kavya.mp3" type="audio/mpeg">
      </audio>

      <!-- Ambience bed (preferred, more reliable on iPhone) -->
      <audio id="ambience" preload="auto" playsinline loop>
        <source src="./kavya-ambience.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="incoming">
      <div class="incomingTop">
        <div>EXTERNAL LINE • PRIORITY</div>
        <div class="badge"><span class="dot"></span> LIVE</div>
      </div>
      <div class="incomingTitle">Tap to answer</div>
      <p class="incomingSub">Manual handshake required to play audio.</p>
      <button class="btn" id="answerBtn">ANSWER</button>
    </div>
  </div>

<script>
  // =========================
  // SETTINGS
  // =========================
  const VOICE_GAIN = 1.0;
  const AMBIENCE_GAIN = 0.55; // louder bed (adjust 0.35–0.75)

  const overlay  = document.getElementById("overlay");
  const answerBtn = document.getElementById("answerBtn");
  const log = document.getElementById("log");

  const voice = document.getElementById("voice");
  const ambience = document.getElementById("ambience");

  // =========================
  // WebAudio fallback ambience (in case ambience mp3 fails)
  // =========================
  let ctx = null;
  let webAmbienceOn = false;
  let webNodes = null;

  function startWebAmbience(){
    if (webAmbienceOn) return;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;

    ctx = ctx || new AudioCtx();

    const master = ctx.createGain();
    master.gain.value = 0.18; // fallback level (mp3 bed is primary)
    master.connect(ctx.destination);

    // low drone
    const droneGain = ctx.createGain();
    droneGain.gain.value = 0.55;
    droneGain.connect(master);

    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    o1.type = "sine"; o2.type = "sine";
    o1.frequency.value = 52;
    o2.frequency.value = 56;
    o1.connect(droneGain);
    o2.connect(droneGain);

    // noise hiss
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i=0; i<data.length; i++) data[i] = (Math.random()*2 - 1) * 0.22;

    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    noise.loop = true;

    const hp = ctx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 260;

    const hissGain = ctx.createGain();
    hissGain.gain.value = 0.24;

    noise.connect(hp);
    hp.connect(hissGain);
    hissGain.connect(master);

    // slow pulse
    const lfo = ctx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.09;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.12;
    lfo.connect(lfoGain);
    lfoGain.connect(master.gain);

    o1.start();
    o2.start();
    noise.start();
    lfo.start();

    webNodes = { master, o1, o2, noise, lfo };
    webAmbienceOn = true;
  }

  async function answer(){
    overlay.style.display = "none";

    log.innerHTML =
      "SYSLOG: handshake accepted<br/>" +
      "NODE: EXT-LINE • ROUTE: DIRECT<br/>" +
      "STATUS: LIVE";

    // Start both audios in the SAME click gesture (most reliable)
    try{
      ambience.volume = AMBIENCE_GAIN;
      // try to play ambience bed
      await ambience.play();
    }catch(e){
      // fallback web audio ambience
      try{
        startWebAmbience();
        if (ctx && ctx.state !== "running") await ctx.resume().catch(()=>{});
      }catch(_){}
    }

    try{
      voice.volume = VOICE_GAIN;
      voice.currentTime = 0;
      await voice.play();
    }catch(e){
      // If voice fails, show overlay again
      overlay.style.display = "flex";
      log.innerHTML = "SYSLOG: audio blocked<br/>NOTE: tap ANSWER to enable voice";
      return;
    }
  }

  answerBtn.addEventListener("click", answer);
</script>
</body>
</html>
