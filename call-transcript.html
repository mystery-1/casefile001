<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Live Call</title>

<style>
body{
  margin:0;
  background:#07090d;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Roboto,Arial,sans-serif;
  color:#e9eef7;
}
.wrap{max-width:800px;margin:0 auto;padding:30px 16px;}
.header{
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:12px;
  color:rgba(255,255,255,.6);
}
.title{
  font-size:30px;
  font-weight:900;
  margin:12px 0 24px;
}
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:22px;
}
.line{margin:14px 0;font-size:18px;line-height:1.6;}
.you b{color:#7fb2ff;}
.security b{color:#fff;}
.system b{color:#a7b1bf;}
.typing{
  color:rgba(255,255,255,.5);
  font-size:14px;
  margin-top:8px;
}
.banner{
  margin-top:20px;
  border:1px solid rgba(198,26,26,.6);
  background:rgba(198,26,26,.1);
  padding:14px;
  border-radius:12px;
}
.btn{
  margin-top:20px;
  background:#c61a1a;
  padding:18px;
  border-radius:14px;
  text-align:center;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="header">Major Crimes Division • Secure Line</div>
  <div class="title">Live Call Transcript</div>

  <div class="card">
    <div id="log"></div>
    <div id="typing" class="typing" style="display:none;">Security is typing…</div>
    <div id="banner" class="banner" style="display:none;">
      Attachment Received • New Suspect: TOM WHITLOCK
    </div>
    <div id="physicalBtn" class="btn" style="display:none;">
      OPEN ENVELOPE A — NEW LEAD
    </div>
  </div>
</div>

<script>
const log=document.getElementById('log');
const typing=document.getElementById('typing');
const banner=document.getElementById('banner');
const btn=document.getElementById('physicalBtn');

const script=[
["you","Hello?"],
["security","Detective… don’t hang up."],
["you","Who is this?"],
["security","Building security. I was on shift the night Olivia arrived."],
["you","She wasn’t alone?"],
["security","No."],
["security","She met someone. A man."],
["you","Who?"],
["security","Tom Whitlock."],
["security","Married."],
["you","How do you know?"],
["security","I saw the ring when he signed in."],
["security","I looked him up later. I shouldn’t have."],
["you","Why are you calling now?"],
["security","Because she’s dead."],
["security","And I don’t want to look like an accomplice."],
["you","Do you have proof?"],
["security","Yes."],
["security","I took a hallway photo. It shows them entering together."],
["you","Send it."],
["system","Attachment Received."],
["system","New suspect flagged: TOM WHITLOCK."]
];

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function run(){
  for(let i=0;i<script.length;i++){
    const [cls,text]=script[i];
    if(cls==="security"){
      typing.style.display="block";
      await sleep(2000+Math.random()*1200);
      typing.style.display="none";
    }else{
      await sleep(1400);
    }
    const div=document.createElement("div");
    div.className="line "+cls;
    div.innerHTML="<b>"+cls.toUpperCase()+":</b> "+text;
    log.appendChild(div);
    log.scrollTop=log.scrollHeight;
  }
  banner.style.display="block";
  await sleep(800);
  btn.style.display="block";
}

run();
</script>
</body>
</html>
