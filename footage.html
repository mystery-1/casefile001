<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footage Archive</title>
  <style>
    :root{
      --bg:#05070b;
      --text:#e9eef7;
      --muted:rgba(255,255,255,.55);
      --border:rgba(255,255,255,.12);
      --panel:rgba(255,255,255,.06);
      --accent:#c61a1a;
    }
    html,body{height:100%;margin:0;background:radial-gradient(1200px 700px at 50% 0%, rgba(255,255,255,.06), transparent), var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Roboto,Arial,sans-serif;}
    .wrap{max-width:880px;margin:0 auto;padding:20px 16px 40px;}
    .topline{letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-size:12px;margin:8px 0 18px;text-align:center}
    .videoShell{
      margin:0 auto;
      width:min(820px,100%);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:0 18px 70px rgba(0,0,0,.6);
    }
    video{width:100%;border-radius:12px;display:block;background:black}
    .hint{margin-top:14px;color:rgba(255,255,255,.40);text-align:center;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
    /* Incoming call toast + modal */
    .toast{
      position:fixed;left:50%;transform:translateX(-50%);
      top:18px;z-index:50;
      background:rgba(0,0,0,.72);
      border:1px solid rgba(255,255,255,.14);
      padding:12px 14px;border-radius:12px;
      display:none;gap:10px;align-items:center;
      box-shadow:0 18px 60px rgba(0,0,0,.65);
      backdrop-filter: blur(10px);
    }
    .toast strong{font-size:13px;letter-spacing:.04em}
    .buzz{width:8px;height:8px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 0 rgba(198,26,26,.55);animation:p 1.2s infinite}
    @keyframes p{0%{box-shadow:0 0 0 0 rgba(198,26,26,.55)}70%{box-shadow:0 0 0 14px rgba(198,26,26,0)}100%{box-shadow:0 0 0 0 rgba(198,26,26,0)}}
    .modalBack{
      position:fixed;inset:0;background:rgba(0,0,0,.62);
      display:none;z-index:60;align-items:center;justify-content:center;
      backdrop-filter: blur(8px);
    }
    .modal{
      width:min(420px,92vw);
      background:rgba(10,12,16,.92);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:18px 16px 16px;
      box-shadow:0 24px 80px rgba(0,0,0,.7);
    }
    .modal h3{margin:0 0 6px;font-size:16px;letter-spacing:.06em;text-transform:uppercase}
    .modal p{margin:0 0 14px;color:rgba(255,255,255,.62);font-size:13px;line-height:1.4}
    .row{display:flex;gap:10px}
    .btn{flex:1;border:none;border-radius:14px;padding:14px 12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .accept{background:var(--accent);color:#fff}
    .decline{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.12)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topline">MAJOR CRIMES DIVISION • ARCHIVE ID: CAM-17B</div>

    <div class="videoShell">
      <video id="vid" controls playsinline preload="metadata">
        <source src="footage.mp4" type="video/mp4" />
      </video>
      <div class="hint">Play footage to review archive</div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span class="buzz"></span>
    <div><strong>CALL INCOMING</strong><div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:2px">Source: Building Security</div></div>
  </div>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3>Incoming Call</h3>
      <p>Building Security is requesting an immediate connection.</p>
      <div class="row">
        <button class="btn decline" id="decline">Decline</button>
        <button class="btn accept" id="accept">Accept</button>
      </div>
    </div>
  </div>

  <script>
    const vid = document.getElementById('vid');
    const toast = document.getElementById('toast');
    const modalBack = document.getElementById('modalBack');
    const accept = document.getElementById('accept');
    const decline = document.getElementById('decline');

    let callTriggered = false;

    function vibrateBuzz(){
      // iPhone Safari may ignore vibration; harmless if unsupported
      if (navigator.vibrate) navigator.vibrate([120, 80, 120]);
    }

    function showCallUI(){
      toast.style.display = 'flex';
      vibrateBuzz();
      setTimeout(()=>{ modalBack.style.display = 'flex'; }, 700);
    }

    // Trigger at 9 seconds
    vid.addEventListener('timeupdate', () => {
      if (!callTriggered && vid.currentTime >= 9) {
        callTriggered = true;
        showCallUI();
      }
    });

    // Accept -> open live transcript
    accept.addEventListener('click', () => {
      window.location.href = 'call-transcript.html';
    });

    // Decline -> forced progression: call back in 2 seconds
    decline.addEventListener('click', () => {
      modalBack.style.display = 'none';
      toast.style.display = 'none';
      setTimeout(() => {
        toast.style.display = 'flex';
        vibrateBuzz();
        setTimeout(()=>{ modalBack.style.display = 'flex'; }, 700);
      }, 2000);
    });

    // Optional: close if user taps outside (still forces call back via decline logic if you want)
    modalBack.addEventListener('click', (e) => {
      if (e.target === modalBack) {
        // treat as decline
        decline.click();
      }
    });
  </script>
</body>
</html>
