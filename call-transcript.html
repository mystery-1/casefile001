<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Secure Line • Call Transcript</title>
  <style>
    :root{
      --bg:#05070b;
      --panel:#0f131b;
      --text:#e9eefb;
      --muted:#9aa7bf;
      --line:rgba(255,255,255,.08);
      --accent:#d22b2b;
      --good:#2bd27b;
      --shadow: 0 20px 60px rgba(0,0,0,.55);
      --radius:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display","SF Pro Text", Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(210,43,43,.16), transparent 55%),
        radial-gradient(900px 500px at 90% 10%, rgba(95,164,255,.10), transparent 60%),
        linear-gradient(180deg, #05070b 0%, #07090b 50%, #05070b 100%);
      color:var(--text);
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }
    .wrap{max-width:560px;margin:0 auto}
    .top{
      display:flex;align-items:flex-start;justify-content:space-between;
      gap:14px;
      padding:6px 2px 14px;
    }
    .kicker{
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(233,238,251,.72);
    }
    .title{
      margin:8px 0 0;
      font-size:40px;
      line-height:1.05;
      letter-spacing:.01em;
    }
    .stamp{
      border:1px solid rgba(210,43,43,.55);
      color:rgba(210,43,43,.95);
      padding:8px 12px;
      border-radius:12px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:12px;
      box-shadow:0 0 0 2px rgba(210,43,43,.06) inset;
      white-space:nowrap;
      margin-top:2px;
    }

    .card{
      margin-top:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .cardhead{
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(0,0,0,.25);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .left{
      display:flex;gap:10px;align-items:center;
      color:rgba(233,238,251,.80);
      font-family:var(--mono);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--good);
      box-shadow:0 0 0 6px rgba(43,210,123,.12);
    }
    .right{
      color:rgba(233,238,251,.70);
      font-family:var(--mono);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .right b{color:rgba(233,238,251,.95)}

    .body{
      padding:14px 16px 16px;
    }
    .wave{
      height:26px;
      display:flex;align-items:flex-end;gap:4px;
      opacity:.85;
      margin-bottom:12px;
    }
    .bar{
      width:4px;border-radius:6px;
      background:rgba(233,238,251,.7);
      animation: bounce 1.15s infinite ease-in-out;
    }
    .bar:nth-child(2){animation-delay:.08s}
    .bar:nth-child(3){animation-delay:.16s}
    .bar:nth-child(4){animation-delay:.24s}
    .bar:nth-child(5){animation-delay:.32s}
    .bar:nth-child(6){animation-delay:.40s}
    .bar:nth-child(7){animation-delay:.48s}
    @keyframes bounce{
      0%,100%{height:6px; opacity:.35}
      50%{height:24px; opacity:.95}
    }

    .chat{
      display:flex;flex-direction:column;gap:12px;
      padding-top:6px;
      min-height:240px;
    }
    .msg{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:flex-start;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .25s ease, transform .25s ease;
    }
    .msg.show{opacity:1; transform: translateY(0)}
    .tag{
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:14px;
      white-space:nowrap;
    }
    .tag.you{color:#7fb2ff}
    .tag.sec{color:#ffffff}
    .txt{
      font-size:18px;
      line-height:1.45;
      color:rgba(233,238,251,.92);
    }
    .txt.dim{color:rgba(233,238,251,.72)}
    .divider{
      height:1px;background:rgba(255,255,255,.07);
      margin:14px 0 10px;
    }

    .tap{
      margin-top:12px;
      display:none;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      padding:14px;
      text-align:center;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      cursor:pointer;
    }

    /* Attachment received screen */
    .attach{
      display:none;
      text-align:center;
      padding:34px 16px 30px;
    }
    .attach h2{
      margin:0 0 10px;
      font-size:28px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .attach p{
      margin:0;
      color:rgba(233,238,251,.78);
      font-size:16px;
      letter-spacing:.02em;
    }
    .badge2{
      display:inline-block;
      margin-top:16px;
      border-radius:999px;
      border:1px solid rgba(210,43,43,.45);
      background:rgba(210,43,43,.10);
      padding:10px 14px;
      font-family:var(--mono);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(233,238,251,.9);
    }

    audio{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="kicker">MAJOR CRIMES DIVISION • SECURE LINE</div>
        <h1 class="title">Live Call Transcript</h1>
      </div>
      <div class="stamp">CONFIDENTIAL</div>
    </div>

    <div class="card" id="callCard">
      <div class="cardhead">
        <div class="left"><span class="dot"></span><span>Channel: Encrypted Voice</span></div>
        <div class="right">Status: <b id="status">CONNECTED</b></div>
      </div>

      <div class="body">
        <div class="wave" id="wave">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="tap" id="tapToStart">Tap to start audio</div>

        <div class="divider"></div>

        <div class="attach" id="attach">
          <h2>Attachment Received</h2>
          <p>Proceed to <b>Envelope A</b>.</p>
          <div class="badge2">SOURCE: BUILDING SECURITY</div>
        </div>
      </div>
    </div>

    <audio id="callAudio" preload="auto"></audio>
  </div>

  <script>
    // Uses the filename saved by footage.html; fallback if opened directly.
    const audioFile = sessionStorage.getItem('mcd_call_audio') || "security-call.mp3.mp3";
    const shouldAutoplay = (sessionStorage.getItem('mcd_call_autoplay') || "0") === "1";

    const callAudio = document.getElementById('callAudio');
    const tapToStart = document.getElementById('tapToStart');
    const statusEl = document.getElementById('status');
    const chat = document.getElementById('chat');
    const attach = document.getElementById('attach');
    const wave = document.getElementById('wave');

    callAudio.src = audioFile;

    // Slower pacing with random pauses (edit only these numbers if you ever want slower/faster)
    function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
    const BASE_DELAY_MS = 1300;     // overall slower baseline
    const JITTER_MS = 1400;         // random extra pause
    const HEAVY_PAUSE_MS = 2200;    // occasional longer pause

    const script = [
      { who:"you", text:"Hello—who is this?" },
      { who:"sec", text:"Detective… listen. Don’t hang up." },
      { who:"you", text:"Identify yourself. Name and role." },
      { who:"sec", text:"Security. Building security. Night shift." },
      { who:"you", text:"Which building? Start from the beginning." },
      { who:"sec", text:"The office building… the one tied to your case. I saw her." },
      { who:"you", text:"You saw Olivia Bennett? When?" },
      { who:"sec", text:"That night. Late. She came in after hours." },
      { who:"you", text:"After hours means what time. Be specific." },
      { who:"sec", text:"Around eleven-forty. I shouldn’t have been looking." },
      { who:"you", text:"Was she alone?" },
      { who:"sec", text:"No." },
      { who:"you", text:"Who was with her?" },
      { who:"sec", text:"A man." },
      { who:"you", text:"Describe him." },
      { who:"sec", text:"Suit. Confident. Like he owned the place." },
      { who:"you", text:"You’re calling me now—why didn’t you report this immediately?" },
      { who:"sec", text:"Because I thought it was… personal. And then she turned up dead." },
      { who:"sec", text:"And I realized I might look involved." },
      { who:"you", text:"You might look involved because you hid it." },
      { who:"you", text:"How do you know that man matters to this case?" },
      { who:"sec", text:"I looked him up later. I shouldn’t have." },
      { who:"you", text:"And?" },
      { who:"sec", text:"Married. Connected." },
      { who:"you", text:"Connected to who? Say the name." },
      { who:"sec", text:"Elena Whitlock." },
      { who:"you", text:"Her husband." },
      { who:"sec", text:"Tom Whitlock." },
      { who:"you", text:"Do you have proof of the meeting?" },
      { who:"sec", text:"I have a hallway photo." },
      { who:"sec", text:"I took it discreetly." },
      { who:"sec", text:"It shows them entering together." },
      { who:"you", text:"Send it. Now." },
      { who:"sys", text:"Attachment received.", dim:true }
    ];

    function makeMsg(who, text, dim){
      const wrap = document.createElement('div');
      wrap.className = 'msg';
      const tag = document.createElement('div');
      const txt = document.createElement('div');

      if (who === 'you'){
        tag.className = 'tag you';
        tag.textContent = 'YOU:';
      } else if (who === 'sec'){
        tag.className = 'tag sec';
        tag.textContent = 'SECURITY:';
      } else {
        tag.className = 'tag sec';
        tag.textContent = 'SYSTEM:';
      }

      txt.className = 'txt' + (dim ? ' dim' : '');
      txt.textContent = text;

      wrap.appendChild(tag);
      wrap.appendChild(txt);
      return wrap;
    }

    async function playTranscript(){
      chat.innerHTML = '';
      attach.style.display = 'none';
      statusEl.textContent = 'CONNECTED';
      wave.style.opacity = '0.9';

      for (let i=0;i<script.length;i++){
        const line = script[i];

        // random pacing:
        let delay = BASE_DELAY_MS + rand(250, JITTER_MS);
        // add heavier pauses on tense beats
        if ([1,5,10,16,20,24].includes(i)) delay += HEAVY_PAUSE_MS;

        await new Promise(r=>setTimeout(r, delay));

        const node = makeMsg(line.who, line.text, !!line.dim);
        chat.appendChild(node);
        requestAnimationFrame(()=>node.classList.add('show'));
        chat.scrollTop = chat.scrollHeight;
      }

      // After transcript completes, show the better "Attachment Received" block
      statusEl.textContent = 'ENDED';
      wave.style.opacity = '0.25';
      attach.style.display = 'block';
    }

    // Try autoplay (may be blocked on iPhone when navigating)
    async function startAudio(){
      try{
        await callAudio.play();
        tapToStart.style.display = 'none';
      } catch(e){
        tapToStart.style.display = 'block';
      }
    }

    tapToStart.addEventListener('click', async ()=>{
      await startAudio();
    });

    // When audio finishes, we still keep transcript pacing; but if your audio ends earlier/later,
    // the transcript continues with the slow pacing (reads better).
    callAudio.addEventListener('ended', ()=>{
      // no-op; transcript controls the flow
    });

    // Start
    (async ()=>{
      if (shouldAutoplay) await startAudio();
      // Always run transcript (this is what makes it “live”)
      playTranscript();
      // Clear autoplay flag so refresh doesn't auto-trigger unexpectedly
      sessionStorage.setItem('mcd_call_autoplay','0');
    })();
  </script>
</body>
</html>
