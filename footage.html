<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footage Archive</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px;
    }

    .label {
      opacity: 0.85;
      letter-spacing: 1px;
      font-size: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 10px;
      background: #111;
    }

    /* CALL INCOMING overlay */
    .call-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .hidden {
      display: none;
    }

    .call-box {
      width: min(420px, 88vw);
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,0.6);
    }

    .call-box h2 {
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      font-size: 18px;
    }

    .call-box p {
      margin: 0 0 18px 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .call-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .call-actions button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      min-width: 120px;
    }

    .accept {
      background: #1f7a3f;
      color: #fff;
    }

    .decline {
      background: #8b0000;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="label">
      Major Crimes Division • Archive ID: CAM-17B
    </div>

    <!-- Make sure your video file name matches -->
    <video id="sceneVideo" controls playsinline>
      <source src="footage.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- CALL INCOMING overlay -->
  <div id="callOverlay" class="call-overlay hidden">
    <div class="call-box">
      <h2>CALL INCOMING</h2>
      <p>Building Security</p>
      <div class="call-actions">
        <button class="accept" onclick="acceptCall()">Accept</button>
        <button class="decline" onclick="declineCall()">Decline</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("sceneVideo");
    const overlay = document.getElementById("callOverlay");

    let callTriggered = false;

    video.addEventListener("timeupdate", () => {
      if (!callTriggered && video.currentTime >= 9) {
        callTriggered = true;

        video.pause();

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }

        overlay.classList.remove("hidden");
      }
    });

    function acceptCall() {
      window.location.href = "call-transcript.html";
    }

    function declineCall() {
      overlay.classList.add("hidden");

      setTimeout(() => {
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }
        overlay.classList.remove("hidden");
      }, 2000);
    }
  </script>
</body>
</html>
