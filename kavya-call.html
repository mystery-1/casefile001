<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Call Active — Kavya</title>
  <style>
    :root{
      --bg:#05070c;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --red:#d11b2d;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 20%, rgba(255,0,80,.08), transparent 55%),
        radial-gradient(900px 600px at 80% 25%, rgba(160,70,255,.16), transparent 60%),
        linear-gradient(180deg, #070a14, var(--bg));
    }
    .wrap{ width:min(820px, 92vw); padding:22px; text-align:center; }
    .title{
      font-size:44px; font-weight:900; letter-spacing:.10em;
      margin:0 0 10px;
      text-transform:uppercase;
    }
    .sub{ color:var(--muted); margin:0; font-size:16px; }

    .overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.70);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }
    .card{
      width:min(760px, 94vw);
      border-radius:22px;
      background: rgba(10,12,18,.92);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
      padding:22px;
      backdrop-filter: blur(14px);
      text-align:left;
    }
    .top{
      display:flex; justify-content:space-between; align-items:center;
      color:rgba(255,255,255,.70);
      font-size:12px; letter-spacing:.22em; text-transform:uppercase;
      margin-bottom:10px;
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .dot{ width:8px; height:8px; border-radius:99px; background:var(--red); box-shadow:0 0 18px rgba(209,27,45,.55);}
    .h1{ font-size:34px; font-weight:900; margin:4px 0 8px; }
    .p{ color:rgba(255,255,255,.70); margin:0 0 14px; line-height:1.45; }
    .btn{
      width:100%;
      padding:16px 14px;
      border-radius:14px;
      border:0;
      font-weight:900;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
      color:#fff;
      background: linear-gradient(180deg, rgba(209,27,45,.92), rgba(130,18,28,.92));
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">CALL ACTIVE — KAVYA</div>
    <p class="sub">Unrecorded / External Line</p>
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <div class="top">
        <div>EXTERNAL LINE • PRIORITY</div>
        <div class="badge"><span class="dot"></span> LIVE</div>
      </div>
      <div class="h1">Tap to answer</div>
      <p class="p">This device requires a manual handshake to play voice audio.</p>
      <button class="btn" id="answerBtn">ANSWER</button>
    </div>
  </div>

  <!-- Main call -->
  <audio id="voice" preload="auto" playsinline>
    <source src="./call-kavya.mp3" type="audio/mpeg">
  </audio>

  <!-- Creepy ambience (no file needed; generated) -->
  <script>
    const overlay = document.getElementById("overlay");
    const answerBtn = document.getElementById("answerBtn");
    const voice = document.getElementById("voice");

    // --- Creepy ambience via WebAudio (LOUDER) ---
    let ctx = null;
    let ambience = null;

    function startAmbience(){
      if (ambience) return;

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      ctx = ctx || new AudioCtx();

      const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * 0.35; // stronger noise

      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuf;
      noise.loop = true;

      const filter = ctx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 420; // dark
      filter.Q.value = 0.9;

      const trem = ctx.createOscillator();
      trem.type = "sine";
      trem.frequency.value = 0.18; // slow

      const tremGain = ctx.createGain();
      tremGain.gain.value = 0.18; // modulation depth

      const out = ctx.createGain();
      out.gain.value = 0.22; // LOUDER than before (was too quiet)

      trem.connect(tremGain);
      tremGain.connect(out.gain);

      noise.connect(filter);
      filter.connect(out);
      out.connect(ctx.destination);

      noise.start();
      trem.start();

      ambience = { noise, trem };
    }

    // --- Answer: start both ambience + voice in ONE tap ---
    let started = false;

    async function answer(){
      if (started) return;
      started = true;

      try{
        // Ensure WebAudio is allowed
        startAmbience();

        // Start voice
        await voice.play();

        overlay.style.display = "none";
      }catch(e){
        // If voice fails, allow retry
        started = false;
      }
    }

    answerBtn.addEventListener("click", answer);
  </script>
</body>
</html>
