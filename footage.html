<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Major Crimes Division • Footage Archive</title>

<style>
:root{
  --bg:#07090d;
  --panel:#0d1118;
  --text:#e9eef7;
  --muted:rgba(255,255,255,.58);
  --border:rgba(255,255,255,.10);
  --accent:#c61a1a;
  --green:#33d17a;
}
html,body{
  height:100%;
  margin:0;
  background:radial-gradient(circle at 20% 0%, rgba(255,255,255,.04), transparent 60%), var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Roboto,Arial,sans-serif;
  color:var(--text);
}
.wrap{max-width:900px;margin:0 auto;padding:30px 16px 40px;}
.brand{
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:12px;
  color:rgba(255,255,255,.6);
}
.title{
  font-size:48px;
  font-weight:1000;
  letter-spacing:.06em;
  margin:16px 0 26px;
}
.meta{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:28px;
}
.pill{
  display:inline-block;
  border:1px solid var(--border);
  padding:12px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.03);
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  width:fit-content;
}
.confidential{
  position:absolute;
  top:30px;
  right:30px;
  border:2px solid var(--accent);
  padding:10px 18px;
  border-radius:8px;
  font-weight:900;
  letter-spacing:.14em;
  color:var(--accent);
  transform:rotate(-2deg);
  background:rgba(198,26,26,.08);
}
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:24px;
  padding:22px;
  box-shadow:0 25px 100px rgba(0,0,0,.7);
}
.videoHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.tag{
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.35);
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:12px;
}
.status{
  border:1px solid rgba(51,209,122,.35);
  background:rgba(51,209,122,.08);
  color:var(--green);
  padding:8px 16px;
  border-radius:999px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
video{
  width:100%;
  border-radius:20px;
  background:black;
}
.footer{
  margin-top:20px;
  font-size:12px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
}

/* Incoming Call */

.toast{
  position:fixed;
  left:50%;
  top:20px;
  transform:translateX(-50%);
  width:min(580px, calc(100% - 24px));
  background:rgba(8,10,14,.95);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  box-shadow:0 30px 120px rgba(0,0,0,.8);
  padding:16px;
  display:none;
  z-index:9999;
}
.toastRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.badge{
  width:50px;height:50px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:1000;
  letter-spacing:.12em;
  border:1px solid rgba(198,26,26,.4);
  background:rgba(198,26,26,.15);
}
.toastMain{
  flex:1;
}
.toastTitle{
  font-weight:1000;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-size:13px;
}
.toastSub{
  font-size:13px;
  color:rgba(255,255,255,.6);
  margin-top:4px;
}
.toastBtns{
  display:flex;
  gap:10px;
}
.tbtn{
  border-radius:14px;
  padding:10px 16px;
  font-weight:1000;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);
  color:white;
}
.tbtn.accept{
  border-color:rgba(51,209,122,.5);
  background:rgba(51,209,122,.12);
  color:var(--green);
}
.tbtn.decline{
  border-color:rgba(198,26,26,.5);
  background:rgba(198,26,26,.12);
}
.pulseBar{
  height:3px;
  margin-top:14px;
  border-radius:999px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
  0%{opacity:.2;transform:translateX(-20%)}
  50%{opacity:1;transform:translateX(0)}
  100%{opacity:.2;transform:translateX(20%)}
}
</style>
</head>

<body>
<div class="confidential">CONFIDENTIAL</div>

<div class="wrap">
  <div class="brand">Major Crimes Division • Secure Internal Server</div>
  <div class="title">FOOTAGE<br>ARCHIVE</div>

  <div class="meta">
    <div class="pill">Case File #001</div>
    <div class="pill">Archive ID: CAM-17B</div>
    <div class="pill">Source: Perimeter Camera</div>
  </div>

  <div class="card">
    <div class="videoHeader">
      <div style="display:flex;gap:12px;">
        <div class="tag">CAM-17B</div>
        <div class="tag">Night Capture</div>
      </div>
      <div class="status" id="statusPill">READY</div>
    </div>

    <video id="footage" controls playsinline preload="metadata">
      <source src="footage.mp4" type="video/mp4" />
    </video>

    <div class="footer">
      Authorized personnel only • Major Crimes Division
    </div>
  </div>
</div>

<!-- Incoming Call -->
<div class="toast" id="toast">
  <div class="toastRow">
    <div class="badge">MCD</div>
    <div class="toastMain">
      <div class="toastTitle">INCOMING CALL</div>
      <div class="toastSub">Building Security • Secure Line</div>
    </div>
    <div class="toastBtns">
      <button class="tbtn decline" id="declineBtn">Decline</button>
      <button class="tbtn accept" id="acceptBtn">Accept</button>
    </div>
  </div>
  <div class="pulseBar"></div>
</div>

<script>
const video = document.getElementById('footage');
const toast = document.getElementById('toast');
const acceptBtn = document.getElementById('acceptBtn');
const declineBtn = document.getElementById('declineBtn');
const statusPill = document.getElementById('statusPill');

let callTriggered = false;

video.addEventListener('play',()=>{
  statusPill.textContent='PLAYING';
});
video.addEventListener('timeupdate',()=>{
  if(!callTriggered && video.currentTime>=9){
    callTriggered=true;
    toast.style.display='block';
    statusPill.textContent='INCOMING CALL';
  }
});

acceptBtn.onclick=()=>window.location.href='call-transcript.html';
declineBtn.onclick=()=>{
  toast.style.display='none';
  setTimeout(()=>toast.style.display='block',2000);
};
</script>
</body>
</html>
