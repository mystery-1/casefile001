<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted Archive – CAM-17B</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#e9e9e9;
  font-family: Arial, sans-serif;
  padding:30px 15px;
}
.container{max-width:520px;margin:auto;}
.header{
  border:1px solid #2a2a2a;
  background:#111;
  padding:15px;
}
.header-top{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#bdbdbd;
}
.header-main{margin-top:6px;font-size:18px;font-weight:bold;}
.header-sub{margin-top:4px;font-size:12px;color:#bdbdbd;}

.panel{
  margin-top:15px;
  border:1px solid #2a2a2a;
  background:#101010;
  padding:16px;
}
.alert{
  border-left:4px solid #8b0000;
  background:#0f0f0f;
  padding:10px 12px;
  font-size:12px;
  line-height:1.5;
  color:#d7d7d7;
}
label{
  display:block;
  margin-top:14px;
  font-size:12px;
  color:#bdbdbd;
  text-transform:uppercase;
  letter-spacing:1px;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  margin-top:8px;
  font-size:16px;
  background:#0c0c0c;
  border:1px solid #333;
  color:white;
}
button{
  width:100%;
  padding:14px;
  margin-top:14px;
  font-size:16px;
  font-weight:bold;
  background:#8b0000;
  border:none;
  color:white;
  cursor:pointer;
}
.syslog{
  margin-top:15px;
  font-family:monospace;
  font-size:11px;
  background:#0c0c0c;
  border:1px dashed #2b2b2b;
  padding:10px;
  color:#9b9b9b;
  line-height:1.35;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-top">Major Crimes Division • Internal Network</div>
    <div class="header-main">SECURE ARCHIVE: CAM-17B</div>
    <div class="header-sub">Access Restricted • Authorization Required</div>
  </div>

  <div class="panel">
    <div class="alert">
      <b>ERROR:</b> This file is sealed under restricted access.<br>
      Enter the authorization code to unlock the archive.
    </div>

    <label>ENTER AUTHORIZATION CODE</label>
    <input id="code" type="text" placeholder="Authorization Code">

    <button onclick="unlock()">SUBMIT CODE</button>

    <div class="syslog" id="syslog">
      SYSLOG: archive locked...<br>
      NODE: CAM-17B • STATUS: RESTRICTED
    </div>
  </div>

</div>

<script>
function unlock(){
  var code = document.getElementById("code").value.trim();
  var sys = document.getElementById("syslog");

  sys.innerHTML = "SYSLOG: verifying code...<br>NODE: CAM-17B • STATUS: CHECKING";

  setTimeout(function(){
    if(code === "37161182"){
      sys.innerHTML = "SYSLOG: authorization accepted.<br>NODE: CAM-17B • STATUS: UNLOCKING";

      // IMPORTANT: unlock live case log access for this device/session
      localStorage.setItem("camUnlocked", "true");

      setTimeout(function(){ window.location.href="footage.html"; }, 500);
    } else {
      sys.innerHTML = "SYSLOG: authorization rejected.<br>NODE: CAM-17B • STATUS: RESTRICTED";
      alert("INVALID AUTHORIZATION CODE");
    }
  }, 500);
}
</script>

</body>
</html>
